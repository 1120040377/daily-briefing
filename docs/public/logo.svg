<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="36" height="36" rx="8" fill="url(#bg)"/>
  <!-- 报纸图标 - 折叠的纸张 -->
  <g transform="translate(6, 7)">
    <!-- 纸张主体 -->
    <rect x="0" y="0" width="18" height="22" rx="2" fill="white" opacity="0.95"/>
    <!-- 折角 -->
    <path d="M18 0 L24 6 L18 6 Z" fill="white" opacity="0.7"/>
    <path d="M18 6 L24 6 L24 20 Q24 22 22 22 L18 22 Z" fill="white" opacity="0.85"/>
    <!-- 标题线 -->
    <rect x="3" y="3.5" width="12" height="2" rx="1" fill="#4F46E5"/>
    <!-- 分隔线 -->
    <line x1="3" y1="7.5" x2="15" y2="7.5" stroke="#CBD5E1" stroke-width="0.5"/>
    <!-- 文字行 -->
    <rect x="3" y="9.5" width="10" height="1.2" rx="0.6" fill="#94A3B8"/>
    <rect x="3" y="12" width="12" height="1.2" rx="0.6" fill="#94A3B8"/>
    <rect x="3" y="14.5" width="8" height="1.2" rx="0.6" fill="#94A3B8"/>
    <!-- 小色块装饰 - 代表AI/前端/天气三个板块 -->
    <rect x="3" y="17.5" width="3" height="2.5" rx="0.5" fill="#6366F1"/>
    <rect x="7.5" y="17.5" width="3" height="2.5" rx="0.5" fill="#8B5CF6"/>
    <rect x="12" y="17.5" width="3" height="2.5" rx="0.5" fill="#A78BFA"/>
  </g>
</svg>
